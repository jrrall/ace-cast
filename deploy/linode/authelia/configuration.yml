# Authelia configuration (E4) — minimal, single-box, SQLite storage + file users.
#
# Secrets are NOT here: JWT / session / storage-encryption keys are injected as
# AUTHELIA_* env vars from .env (see docker-compose.sqlite.yml). Keep this file
# committed; keep .env secret.
#
# This is the smallest viable setup that fits a 1 GB Nanode: local file user
# backend, SQLite storage, in-memory rate limiting. No external database.

theme: dark

# Served under /authelia (Caddy proxies /authelia/* here WITHOUT stripping the
# prefix), so portal assets + the /api/verify endpoint all live under /authelia
# and line up with the public URL. Change the path here and in the Caddyfile
# together if you ever move it.
server:
  address: 'tcp://0.0.0.0:9091/authelia'

log:
  level: info

# One-factor is enough to gate /account (it just identifies the user for the
# app). Bump to two_factor here if you want TOTP/WebAuthn on admin surfaces.
authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2

access_control:
  # This Authelia instance only fronts /account* + /admin* (Caddy forward-auths
  # just those), so "any authenticated user may pass" is exactly right — the app
  # does its own per-user authorization from the Remote-* headers. We use
  # default_policy instead of a `domain` rule on purpose: a bare `domain: '*'`
  # does NOT match a multi-label host like unholy.cards (Authelia's `*` only
  # wildcards one leftmost label), so it left unauthenticated hits denied with a
  # 403 instead of redirecting them to the login portal. Add rules with
  # `domain_regex`/`subject`/`groups` here if you later want admin-only gating.
  default_policy: one_factor

session:
  # `secret` comes from AUTHELIA_SESSION_SECRET (a scalar env var — that works).
  # The cookies LIST cannot be set via env vars in 4.38 (AUTHELIA_SESSION_COOKIES_0_*
  # is rejected as "not expected"), so it lives here. SITE_ADDRESS is injected by
  # the `template` config filter (X_AUTHELIA_CONFIG_FILTERS=template + the
  # SITE_ADDRESS env var, both set in docker-compose.sqlite.yml). authelia_url is
  # the portal's public base so the forward-auth redirect has somewhere to go.
  cookies:
    - domain: '{{ env "SITE_ADDRESS" }}'
      authelia_url: 'https://{{ env "SITE_ADDRESS" }}/authelia'
      name: 'authelia_session'
      expiration: '1h'
      inactivity: '15m'

storage:
  # encryption_key comes from AUTHELIA_STORAGE_ENCRYPTION_KEY.
  local:
    path: /data/db.sqlite3

notifier:
  # No SMTP on the box: password-reset / verification notifications are written
  # to a file. Swap for an smtp notifier if you wire up email later.
  filesystem:
    filename: /data/notification.txt

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m
