# Ace Cast — cheapest single-box stack: SQLite on the same host, no database server.
#
#   caddy (:80/:443, auto-HTTPS + WebSocket proxy) ──▶ app (:3000, SQLite on a volume)
#
# Right-sized for the current architecture: rooms already live in memory (one app
# instance only), so a separate database process buys nothing yet. The SQLite file
# lives on the `acecast_data` volume and survives image rebuilds. Fits a $5 Nanode.
#
# Usage (from this directory, after filling in .env — SITE_ADDRESS + PUBLIC_URL only):
#   docker compose -f docker-compose.sqlite.yml up -d --build
name: ace-cast

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: ace-cast:latest
    restart: unless-stopped
    environment:
      # SQLite file inside the mounted volume. The sqlite:// scheme selects the
      # better-sqlite3 dialect automatically; migrate+seed runs on boot.
      DATABASE_URL: sqlite:///app/data/ace-cast.db
      PUBLIC_URL: ${PUBLIC_URL:?set PUBLIC_URL in .env}
      ALLOWED_ORIGINS: ${PUBLIC_URL}
      TRUST_PROXY: "true"
      PORT: "3000"
      # E4 accounts: prod trusts the Remote-* headers Caddy forwards from
      # Authelia (safe only because TRUST_PROXY is true and /account* is proxied).
      AUTH_PROVIDER: "forward"
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?set AUTH_SESSION_SECRET in .env}
    volumes:
      # The database lives here — this is what makes data durable across redeploys.
      - acecast_data:/app/data
    expose:
      - "3000"

  # Self-hosted IdP (E4). A single lightweight service — local file users
  # backend + SQLite storage — so it fits alongside app+Caddy+SQLite on a 1 GB
  # Nanode (~30-50 MB RSS; contrast authentik's Postgres+Redis+worker, which
  # would exhaust the box). Caddy forward-auths /account* + /admin* to it.
  authelia:
    image: authelia/authelia:4.38
    restart: unless-stopped
    expose:
      - "9091"
    environment:
      # Secrets come from .env (never committed). See authelia/configuration.yml.
      AUTHELIA_JWT_SECRET: ${AUTHELIA_JWT_SECRET:?set AUTHELIA_JWT_SECRET in .env}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET:?set AUTHELIA_SESSION_SECRET in .env}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY:?set AUTHELIA_STORAGE_ENCRYPTION_KEY in .env}
      # The public domain, used to build Authelia's session cookie + redirect.
      AUTHELIA_SESSION_DOMAIN: ${SITE_ADDRESS}
      AUTHELIA_SESSION_COOKIES_0_AUTHELIA_URL: https://${SITE_ADDRESS}/authelia
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:ro
      - authelia_data:/data

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
      - authelia
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set SITE_ADDRESS (your domain) in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  acecast_data:
  authelia_data:
  caddy_data:
  caddy_config:
