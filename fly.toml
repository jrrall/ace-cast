# Fly.io deployment config. Rename `app` to your own unique name before deploying.
# Deploy with:  fly launch --no-deploy   (first time, to create the app)  then  fly deploy
app = "ace-cast"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # Keep a single always-on machine: rooms live in memory, so multiple
  # instances would not share state until we add the Redis adapter.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 400
    soft_limit = 300

[[http_service.checks]]
  interval = "30s"
  timeout = "3s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[env]
  PORT = "3000"
  TRUST_PROXY = "true"
  # PUBLIC_URL and ALLOWED_ORIGINS are best set as secrets/vars after launch:
  #   fly secrets set PUBLIC_URL=https://your-app.fly.dev
